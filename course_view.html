{% extends "base.html" %}

{% block title %}{{ course_name }} - Indispeak{% endblock %}

{% block extra_css %}
<style>
    .course-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        text-align: center;
    }

    .course-header h1 {
        margin: 0 0 10px 0;
        font-size: 36px;
    }

    .lesson-list {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .lesson-item {
        padding: 15px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
    }

    .lesson-item:last-child {
        border-bottom: none;
    }

    .lesson-item:hover {
        background: #f9f9f9;
    }

    .lesson-title {
        font-weight: bold;
        color: #333;
    }

    .btn-learn {
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
    }

    .btn-learn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="course-header">
    <h1>{{ course_name }}</h1>
    <p>Complete lessons to master this language</p>
</div>

<div class="lesson-list">
    <h2>📚 Lessons</h2>
    {% for i in range(1, 11) %}
    <div class="lesson-item">
        <span class="lesson-num">Lesson {{ i }}</span>
        <a href="{{ url_for('main.lesson_view', course_name=course_name, lesson_num=i) }}" class="btn-learn">
            Learn
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
